# bol-tts-marathi v0.4 SMOKE — 2-epoch frozen→unfrozen architecture validation.
#
# Identical to config_marathi_v0_4_langcond.yml except:
#   - epochs: 2 (1 frozen with freeze_backbone_epochs:1 + 1 unfrozen)
#   - data_params point at the stub smoke manifests (lang_ids are pseudo-random
#     not semantically aligned — fine for architecture validation)
#   - log_dir is a separate "smoke" subdir so it doesn't pollute the real run
#
# What this validates (smoke #6, post-v0.4.3 load_checkpoint fix):
#   1. patches apply cleanly (lang_embedding present, lang_ids threaded through)
#   2. forward+backward runs end-to-end without NaN across BOTH epochs
#   3. epoch-0 weight norms byte-identical to v0.2 baseline (load fix)
#   4. epoch-1 (UNFROZEN) — predictor_encoder norm stays > 0.5, no v0.2-attempt-1
#      collapse, no catastrophic drift now that grads flow through the backbone
#   5. validation loss stays in the 0.20-0.25 range across both epochs
#
# What this does NOT validate:
#   - Whether v0.4 actually improves Minglish quality (need full run + eval)
#   - Whether the lexicon flip rate is in the sweet spot (smoke manifest is stub)
#
# Launch (from kokoro-deutsch/StyleTTS2):
#   STAGE=2 CONFIG=../../bol-tts-marathi/experiments/v0_4_lang_conditioning/configs/config_marathi_v0_4_smoke.yml ./launch_training.sh
#
# Expected runtime: ~10-15 min on A100. Watch predictor_encoder norm at end
# of epoch 1 and the validation-loss delta epoch0→1.
batch_size: 8
epochs: 2
epochs_1st: 10
epochs_2nd: 2
save_freq: 1

pretrained_model: "logs/kokoro-marathi/epoch_2nd_v0_2_FINAL.pth"
first_stage_path: "first_stage.pth"
load_only_params: true
second_stage_load_pretrained: true

# v0.4.2: freeze the loaded backbone for first N epochs so only lang_embedding
# trains during the warmup (prevents the cascading gradient pressure that
# catastrophically reshaped trained modules in v0.4.0/4.1 — see post-mortem).
freeze_backbone_epochs: 1

log_dir: "logs/kokoro-marathi-v0_4-smoke"

data_params:
  train_data: "../experiments/v0_4_lang_conditioning/data/train_list_smoke_intspk.txt"
  val_data: "../experiments/v0_4_lang_conditioning/data/val_list_smoke_intspk.txt"
  root_path: "../dataset/audio"
  OOD_data: "../training/OOD_texts.txt"
  min_length: 50
  num_workers: 8

preprocess_params:
  sr: 24000
  spect_params:
    n_fft: 2048
    win_length: 1200
    hop_length: 300
    n_mels: 80
    fmin: 0
    fmax: 8000

model_params:
  dim_in: 64
  n_token: 178
  hidden_dim: 512
  style_dim: 128
  max_dur: 50
  multispeaker: false
  n_mels: 80
  dropout: 0.2
  n_layer: 3
  text_encoder_kernel_size: 5

  decoder:
    type: istftnet
    upsample_rates: [10, 6]
    upsample_kernel_sizes: [20, 12]
    upsample_initial_channel: 512
    resblock_kernel_sizes: [3, 7, 11]
    resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
    gen_istft_n_fft: 20
    gen_istft_hop_size: 5

  diffusion:
    embedding_mask_proba: 0.1
    transformer:
      num_layers: 3
      num_heads: 8
      head_features: 64
      multiplier: 2
    dist:
      sigma_data: 0.2
      estimate_sigma_data: true
      mean: -3.0
      std: 1.0

  plbert:
    hidden_size: 768
    num_attention_heads: 12
    intermediate_size: 2048
    max_position_embeddings: 512
    num_hidden_layers: 12
    dropout: 0.1

  slm:
    model: "microsoft/wavlm-base-plus"
    sr: 16000
    hidden: 768
    nlayers: 13
    initial_channel: 64

loss_params:
  lambda_gen: 1.0
  lambda_mel: 5.0
  lambda_dur: 1.0
  lambda_ce: 20.0
  lambda_F0: 1.0
  lambda_norm: 1.0
  lambda_s2s: 1.0
  lambda_mono: 1.0
  lambda_slm: 1.0
  lambda_diff: 0.0
  lambda_sty: 0.0
  TMA_epoch: 0
  diff_epoch: 999
  joint_epoch: 3   # No adversarial loss in epoch 0 anyway (joint_epoch:3)

optimizer_params:
  lr: 0.0001
  bert_lr: 0.00001
  ft_lr: 0.0001

training:
  epochs: 1
  batch_size: 4
  save_freq: 1
  log_interval: 10
  eval_interval: 500
  pretrained_model: ""
  load_only_params: true
  second_stage_load_pretrained: true

F0_path: "Utils/JDC/bst.t7"
ASR_config: "Utils/ASR/config.yml"
ASR_path: "Utils/ASR/epoch_00080.pth"
PLBERT_dir: "Utils/PLBERT/"

slmadv_params:
  min_len: 100
  max_len: 500
  batch_percentage: 0.5
  iter: 10
  thresh: 5
  scale: 0.01
  sig: 1.5
